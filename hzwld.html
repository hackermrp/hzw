    #sidebar { 
      width:320px; background:#fff; border-right:1px solid #ddd; 
      display:flex; flex-direction:column; z-index:10; 
      transition: transform 0.3s ease; flex-shrink:0;
    }
    #sidebar.collapsed { transform: translateX(-100%); }
    
    .search-box { padding:15px; border-bottom:1px solid #eee; background:#fafafa; }
    #search { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:14px; outline:none; }

    #list-container { flex:1; overflow-y:auto; padding:10px 0; -webkit-overflow-scrolling:touch; }
    .list-item { 
      padding:10px 15px; cursor:pointer; border-bottom:1px solid #f0f0f0; 
      transition:background 0.2s; display:flex; justify-content:space-between; align-items:center;
      min-height:50px;
    }
    .list-item:hover { background:#f0f7ff; }
    .list-item.active { background:#e6f7ff; border-left:3px solid #1890ff; }
    .item-name { font-size:14px; color:#333; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:70%; }
    .item-value { font-size:12px; padding:2px 8px; border-radius:10px; color:white; background:#999; font-weight:bold; min-width:36px; text-align:center; }
    .color-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; flex-shrink:0; }
    
    #container { flex:1; height:100%; position:relative; }
    .stats-bar { padding:10px; font-size:12px; color:#666; text-align:center; border-top:1px solid #eee; background:#fafafa; }
    
    #toggle-btn {
      display:none; position:fixed; top:12px; left:12px; z-index:100;
      width:40px; height:40px; border-radius:50%; background:#1890ff; color:white;
      border:none; font-size:20px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.2);
      align-items:center; justify-content:center;
    }
    #toggle-btn:active { background:#096dd9; }
    
    #overlay {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.4); z-index:9;
    }
    
    /* 🔑 信息窗样式增强 */
    .info-window { min-width:180px; max-width:260px; }
    .info-window .label { color:#888; font-size:12px; margin-right:4px; }
    .info-window .value { color:#333; font-weight:500; }
    .info-window .dev { color:#1890ff; }
    .info-window .prop { color:#52c41a; }
    .info-window hr { border:0; border-top:1px dashed #e0e0e0; margin:6px 0; }
    
    /* 移动端适配 */
    @media (max-width: 768px) {
      body { flex-direction:column; }
      #sidebar {
        width:85%; max-width:320px; position:fixed; top:0; left:0; height:100%;
        box-shadow:2px 0 10px rgba(0,0,0,0.1); transform:translateX(-100%);
      }
      #sidebar.open { transform:translateX(0); }
      #toggle-btn { display:flex; }
      #overlay.active { display:block; }
      #container { width:100%; }
      .list-item { padding:12px 15px; min-height:56px; }
      .item-name { font-size:15px; }
      .item-value { font-size:13px; padding:3px 10px; }
      .search-box { padding:12px 15px; }
      #search { font-size:16px; padding:12px; }
      
      /* 移动端信息窗优化 */
      .info-window { min-width:160px; max-width:240px; }
      .info-window b { font-size:14px; }
      .info-window .value { font-size:13px; }
    }
    
    @media (min-width: 769px) and (max-width: 1024px) {
      #sidebar { width:280px; }
      .list-item { padding:9px 12px; }
    }

</head>

  const INFO_TEMPLATE = `
      <div class="info-window" style="min-width:180px;max-width:260px">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:6px">
          <b style="font-size:15px;color:#333">${{name}}</b>
          <span style="background:${{color}};color:white;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:bold">${{value}}</span>
        </div>
        <hr style="border:0;border-top:1px dashed #e0e0e0;margin:6px 0">
        <div style="font-size:13px;color:#555;line-height:1.6">
          ${{developer_html}}
          ${{property_html}}
        </div>
      </div>
    `;
  let markers = [];
  let map, infoWindow;
  let isMobile = window.innerWidth <= 768;

  function initMap() {
    map = new AMap.Map('container', {
      zoom: 13, 
      center: [121.23224627329193, 30.325995732919257], 
      resizeEnable: true,
      touchZoom: true,
      touchZoomCenter: true,
      isHotspot: false
    });
    
    infoWindow = new AMap.InfoWindow({ 
      offset: new AMap.Pixel(0, -15),
      closeWhenClickMap: true
    });
    
    renderList(DATA);
    addMarkers(DATA);
    document.getElementById('count-display').innerText = DATA.length;
    
    window.addEventListener('resize', () => {
      isMobile = window.innerWidth <= 768;
      if (!isMobile) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('sidebar').style.transform = '';
      }
    });
  }

  // 🔑 生成信息窗内容的函数（支持条件渲染）
  function buildInfoContent(p) {
    // 条件生成开发商HTML
    const devHtml = p.developer ? 
      `<div><span class="label">开发商:</span><span class="value dev">${p.developer}</span></div>` : '';
    // 条件生成物业公司HTML  
    const propHtml = p.property ? 
      `<div><span class="label">物业公司:</span><span class="value prop">${p.property}</span></div>` : '';
    
    // 如果都没有，添加提示
    const extraInfo = devHtml || propHtml ? devHtml + propHtml : 
      '<div style="color:#999;font-size:12px">暂无详细信息</div>';
    
    return INFO_TEMPLATE
      .replace('${name}', p.name)
      .replace('${value}', p.value)
      .replace('${color}', p.color)
      .replace('${developer_html}', devHtml)
      .replace('${property_html}', propHtml);
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    if (isMobile) {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    }
  }

  function renderList(items) {
    const container = document.getElementById('list-container');
    container.innerHTML = '';
    items.forEach((p, idx) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.dataset.index = DATA.indexOf(p);
      
      // 列表项也显示开发商/物业简略信息（可选）
      const extraInfo = p.developer || p.property ? 
        `<div style="font-size:11px;color:#999;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:95%">
          ${p.developer ? '🏢'+p.developer : ''}${p.developer && p.property ? ' · ' : ''}${p.property ? '🔑'+p.property : ''}
        </div>` : '';
      
      item.innerHTML = `
        <div style="display:flex;align-items:center;width:75%">
          <span class="color-dot" style="background:${p.color}"></span>
          <span class="item-name" title="${p.name}">${p.name}</span>
        </div>
        <span class="item-value" style="background:${p.color}">${p.value}</span>` + extraInfo;
      
      item.onclick = (e) => {
        e.stopPropagation();
        highlightItem(item);
        focusPoint(DATA.indexOf(p));
        if (isMobile) toggleSidebar();
      };
      item.addEventListener('touchstart', () => {}, {passive:true});
      container.appendChild(item);
    });
  }

  function addMarkers(items) {
    items.forEach(p => {
      const marker = new AMap.Marker({
        position: [p.lng, p.lat], map: map, cursor: 'pointer',
        content: `<div style="width:16px;height:16px;background:${p.color};border:2px solid white;border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,0.3)"></div>`,
        offset: new AMap.Pixel(-8, -8),
        extData: p
      });
      
      marker.on('click', function(e) {
        const p = this.getExtData();
        const idx = DATA.indexOf(p);
        
        // 高亮列表项
        const listItems = document.querySelectorAll('.list-item');
        listItems.forEach(item => {
          if (item.dataset.index == idx) {
            highlightItem(item);
            if (isMobile) item.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        });
        
        // 地图居中 + 显示信息窗
        map.setZoomAndCenter(16, [p.lng, p.lat]);
        infoWindow.setContent(buildInfoContent(p));
        infoWindow.open(map, marker.getPosition());
      });
      markers.push(marker);
    });
  }

  function focusPoint(index) {
    const p = DATA[index];
    const target = markers.find(m => m.getExtData() === p);
    if (target) {
      map.setZoomAndCenter(16, [p.lng, p.lat]);
      infoWindow.setContent(buildInfoContent(p));
      infoWindow.open(map, target.getPosition());
    }
  }

  function highlightItem(el) {
    document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
  }

  function filterList() {
    const key = document.getElementById('search').value.toLowerCase().trim();
    const filtered = key ? DATA.filter(p => 
      p.name.toLowerCase().includes(key) || 
      (p.developer && p.developer.toLowerCase().includes(key)) ||
      (p.property && p.property.toLowerCase().includes(key))
    ) : DATA;
    renderList(filtered);
    if (isMobile && key && !document.getElementById('sidebar').classList.contains('open')) {
      toggleSidebar();
    }
  }

  // 初始化
  if (typeof AMap !== 'undefined') {
    AMap.plugin('AMap.InfoWindow', () => initMap());
  } else {
    const script = document.createElement('script');
    script.src = 'https://webapi.amap.com/maps?v=2.0&key=d51ba3aeb39576c52e16cc66e23b8df7';
    script.onload = () => {
      AMap.plugin('AMap.InfoWindow', () => initMap());
    };
    document.head.appendChild(script);
  }
  
  document.addEventListener('touchmove', function(e) {
    if (e.target.closest('#container')) {}
  }, { passive: true });
</script>
</body>
</html>
