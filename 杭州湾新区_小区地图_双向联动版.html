  let markers = [];
  let map, infoWindow;

  function initMap() {
    map = new AMap.Map('container', {
      zoom: 13, center: [121.23224627329193, 30.325995732919257], resizeEnable: true
    });
    infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -15) });
    renderList(DATA);
    addMarkers(DATA);
    document.getElementById('count-display').innerText = DATA.length;
  }

  function renderList(items) {
    const container = document.getElementById('list-container');
    container.innerHTML = '';
    items.forEach((p, idx) => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.dataset.index = DATA.indexOf(p);
      item.innerHTML = `
        <div style="display:flex;align-items:center;width:75%">
          <span class="color-dot" style="background:${p.color}"></span>
          <span class="item-name" title="${p.name}">${p.name}</span>
        </div>
        <span class="item-value" style="background:${p.color}">${p.value}</span>`;
      item.onclick = () => {
        highlightItem(item);
        focusPoint(DATA.indexOf(p));
      };
      container.appendChild(item);
    });
  }

  function addMarkers(items) {
    items.forEach(p => {
      const marker = new AMap.Marker({
        position: [p.lng, p.lat], map: map, cursor: 'pointer',
        content: `<div style="width:16px;height:16px;background:${p.color};border:2px solid white;border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,0.3)"></div>`,
        offset: new AMap.Pixel(-8, -8)
      });
      marker._data = p;
      
      // 🔑 关键修复：添加地图圆点点击事件
      marker.on('click', () => {
        // 1. 高亮左侧对应列表项
        const listItems = document.querySelectorAll('.list-item');
        listItems.forEach(item => {
          if (item.dataset.index == DATA.indexOf(p)) {
            highlightItem(item);
            item.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        });
        // 2. 地图居中放大
        map.setZoomAndCenter(16, [p.lng, p.lat]);
        // 3. 弹出信息窗
        const content = `<div style="min-width:160px"><b style="font-size:14px">${p.name}</b>
          <hr style="border:0;border-top:1px dashed #eee;margin:8px 0">
          数量：<span style="color:${p.color};font-weight:bold;font-size:18px">${p.value}</span></div>`;
        infoWindow.setContent(content);
        infoWindow.open(map, marker.getPosition());
      });
      markers.push(marker);
    });
  }

  function focusPoint(index) {
    const p = DATA[index];
    const target = markers.find(m => m._data === p);
    if (target) {
      map.setZoomAndCenter(16, [p.lng, p.lat]);
      const content = `<div style="min-width:160px"><b style="font-size:14px">${p.name}</b>
        <hr style="border:0;border-top:1px dashed #eee;margin:8px 0">
        数量：<span style="color:${p.color};font-weight:bold;font-size:18px">${p.value}</span></div>`;
      infoWindow.setContent(content);
      infoWindow.open(map, target.getPosition());
    }
  }

  function highlightItem(el) {
    document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
  }

  function filterList() {
    const key = document.getElementById('search').value.toLowerCase();
    const filtered = DATA.filter(p => p.name.toLowerCase().includes(key));
    renderList(filtered);
  }

  if (typeof AMap !== 'undefined') initMap();
  else {
    const script = document.createElement('script');
    script.src = 'https://webapi.amap.com/maps?v=2.0&key=d51ba3aeb39576c52e16cc66e23b8df7';
    script.onload = initMap;
    document.head.appendChild(script);
  }
</script>
